<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — WrappDelights</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Manrope:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#af101a",
            "on-primary": "#ffffff",
          },
          fontFamily: {
            headline: ["Noto Serif", "serif"],
            body: ["Manrope", "sans-serif"],
          },
        },
      },
    };
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red:        #af101a;
      --red-deep:   #7a0010;
      --red-soft:   #fce8e8;
      --cream:      #fdf7f6;
      --ink:        #1a1010;
      --muted:      #7a5a58;
      --border:     #e8d0ce;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Manrope', sans-serif;
      background: var(--cream);
      color: var(--ink);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Canvas bg ── */
    .bg-canvas {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(175,16,26,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 15% 85%, rgba(175,16,26,0.05) 0%, transparent 70%),
        var(--cream);
    }

    /* Subtle grid texture */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.025;
      background-image:
        linear-gradient(var(--red) 1px, transparent 1px),
        linear-gradient(90deg, var(--red) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* ── Big floating ribbon ── */
    .ribbon-bg {
      position: fixed;
      top: -120px; right: -80px;
      width: 500px; height: 500px;
      border: 2px dashed rgba(175,16,26,0.12);
      border-radius: 50%;
      z-index: 0; pointer-events: none;
      animation: spin 40s linear infinite;
    }
    .ribbon-bg::after {
      content: '';
      position: absolute;
      inset: 40px;
      border: 2px dashed rgba(175,16,26,0.07);
      border-radius: 50%;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .ribbon-bg-2 {
      position: fixed;
      bottom: -140px; left: -100px;
      width: 400px; height: 400px;
      border: 2px solid rgba(175,16,26,0.06);
      border-radius: 50%;
      z-index: 0; pointer-events: none;
      animation: spin 60s linear infinite reverse;
    }

    /* ── Wrapper ── */
    .wrapper {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
      max-width: 1100px;
      width: 100%;
      padding: 40px 60px;
    }

    /* ── Left: Typography ── */
    .left {
      animation: slideUp 0.7s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .kicker {
      display: inline-flex; align-items: center; gap: 10px;
      margin-bottom: 24px;
    }
    .kicker-line { width: 28px; height: 1px; background: var(--red); opacity: 0.5; }
    .kicker-text {
      font-size: 10px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.22em;
      color: var(--red);
    }

    .four-o-four {
      font-family: 'Noto Serif', serif;
      font-size: clamp(5.5rem, 11vw, 9.5rem);
      font-weight: 700;
      line-height: 0.9;
      letter-spacing: -4px;
      background: linear-gradient(145deg, var(--red) 0%, var(--red-deep) 60%, #400008 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      display: inline-block;
      margin-bottom: 8px;
    }

    /* Embossed outline behind */
    .four-o-four::before {
      content: '404';
      position: absolute;
      inset: 0;
      font-family: 'Noto Serif', serif;
      font-size: inherit;
      font-weight: 700;
      letter-spacing: -4px;
      -webkit-text-stroke: 1px rgba(175,16,26,0.12);
      -webkit-text-fill-color: transparent;
      color: transparent;
      transform: translate(4px, 5px);
      z-index: -1;
    }

    .title {
      font-family: 'Noto Serif', serif;
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700;
      font-style: italic;
      color: var(--ink);
      margin-bottom: 16px;
      line-height: 1.3;
    }

    .desc {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.7;
      max-width: 380px;
      margin-bottom: 36px;
    }

    /* ── Buttons ── */
    .btns {
      display: flex; gap: 12px; flex-wrap: wrap;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 26px;
      border-radius: 12px;
      font-weight: 800;
      font-size: 11px;
      text-decoration: none;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: all 0.28s cubic-bezier(.16,1,.3,1);
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--red) 0%, var(--red-deep) 100%);
      color: #fff;
      box-shadow: 0 8px 28px rgba(175,16,26,0.25), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 40px rgba(175,16,26,0.35), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .btn-primary:active { transform: translateY(-1px); }

    .btn-ghost {
      background: transparent;
      color: var(--red);
      border: 1.5px solid var(--border);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .btn-ghost:hover {
      background: var(--red-soft);
      border-color: rgba(175,16,26,0.3);
      transform: translateY(-2px);
    }

    .btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* ── Right: Gift illustration ── */
    .right {
      display: flex;
      justify-content: center;
      align-items: center;
      animation: slideUp 0.7s 0.15s cubic-bezier(.16,1,.3,1) both;
    }

    .scene {
      position: relative;
      width: 340px; height: 360px;
    }

    /* Main box body */
    .gift-box {
      position: absolute;
      bottom: 60px; left: 50%; transform: translateX(-50%);
      width: 200px; height: 160px;
    }

    .box-body {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 120px;
      background: linear-gradient(160deg, #fff5f5 0%, #fce0e0 100%);
      border-radius: 8px 8px 14px 14px;
      border: 1.5px solid var(--border);
      box-shadow: 0 20px 50px rgba(175,16,26,0.12), 0 4px 12px rgba(0,0,0,0.06);
    }

    /* Stripe on box */
    .box-stripe {
      position: absolute;
      bottom: 0; left: 50%; transform: translateX(-50%);
      width: 28px; height: 120px;
      background: linear-gradient(180deg, rgba(175,16,26,0.15), rgba(175,16,26,0.08));
      border-left: 1px solid rgba(175,16,26,0.2);
      border-right: 1px solid rgba(175,16,26,0.2);
    }

    /* Lid */
    .box-lid {
      position: absolute;
      bottom: 116px; left: -10px; right: -10px;
      height: 34px;
      background: linear-gradient(160deg, #fff8f8 0%, #f5d4d4 100%);
      border-radius: 8px;
      border: 1.5px solid var(--border);
      box-shadow: 0 6px 20px rgba(175,16,26,0.1), 0 -2px 0 rgba(255,255,255,0.6) inset;
    }

    .lid-stripe {
      position: absolute;
      top: 0; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 28px;
      background: rgba(175,16,26,0.12);
      border-left: 1px solid rgba(175,16,26,0.18);
      border-right: 1px solid rgba(175,16,26,0.18);
    }

    /* Ribbon */
    .ribbon-v {
      position: absolute;
      bottom: 0; left: 50%; transform: translateX(-50%);
      width: 28px; height: 160px;
      background: linear-gradient(180deg, var(--red) 0%, #c41020 100%);
      opacity: 0.85;
      z-index: 5;
    }

    .ribbon-h {
      position: absolute;
      bottom: 58px; left: 0; right: 0;
      height: 28px;
      background: linear-gradient(90deg, var(--red) 0%, #c41020 100%);
      opacity: 0.85;
      z-index: 5;
    }

    /* Bow */
    .bow {
      position: absolute;
      bottom: 148px; left: 50%; transform: translateX(-50%);
      width: 80px; height: 48px;
      z-index: 10;
    }

    .bow-left, .bow-right {
      position: absolute;
      width: 38px; height: 38px;
      border-radius: 50% 50% 50% 0;
      background: linear-gradient(135deg, #d01525 0%, var(--red-deep) 100%);
      box-shadow: 0 4px 12px rgba(122,0,16,0.3);
    }
    .bow-left {
      left: 2px; top: 4px;
      transform: rotate(135deg);
    }
    .bow-right {
      right: 2px; top: 4px;
      transform: rotate(-45deg);
      border-radius: 50% 50% 0 50%;
    }
    .bow-center {
      position: absolute;
      left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 2px 8px rgba(122,0,16,0.4), inset 0 1px 0 rgba(255,255,255,0.25);
      z-index: 11;
    }

    /* Floating tag */
    .gift-tag {
      position: absolute;
      top: 30px; right: 20px;
      width: 70px; height: 90px;
      background: #fff;
      border-radius: 8px 8px 8px 8px;
      border: 1.5px solid var(--border);
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 6px;
      padding: 10px;
      z-index: 20;
      animation: tagFloat 3s ease-in-out infinite;
    }

    .gift-tag::before {
      content: '';
      position: absolute;
      top: -8px; left: 50%; transform: translateX(-50%);
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: #fff;
    }

    .gift-tag::after {
      content: '';
      position: absolute;
      top: -18px; left: 50%; transform: translateX(-50%);
      width: 1px; height: 12px;
      background: rgba(175,16,26,0.25);
    }

    .tag-question {
      font-family: 'Noto Serif', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--red);
      line-height: 1;
    }

    .tag-text {
      font-size: 8px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-align: center;
      line-height: 1.4;
    }

    @keyframes tagFloat {
      0%, 100% { transform: translateY(0) rotate(5deg); }
      50%       { transform: translateY(-12px) rotate(3deg); }
    }

    /* Sparkles */
    .sparkle {
      position: absolute;
      pointer-events: none;
      animation: sparkleAnim var(--dur, 2.5s) ease-in-out infinite var(--delay, 0s);
    }
    @keyframes sparkleAnim {
      0%, 100% { opacity: 0; transform: scale(0.3) rotate(0deg); }
      40%       { opacity: 1; transform: scale(1) rotate(180deg); }
      80%       { opacity: 0.4; }
    }

    .sparkle-star {
      width: var(--sz, 14px); height: var(--sz, 14px);
      display: block;
    }

    /* Shadow */
    .box-shadow-el {
      position: absolute;
      bottom: 40px; left: 50%; transform: translateX(-50%);
      width: 160px; height: 20px;
      background: radial-gradient(ellipse, rgba(122,0,16,0.15) 0%, transparent 70%);
      border-radius: 50%;
      filter: blur(4px);
    }

    /* Responsive */
    @media (max-width: 768px) {
      body { overflow: auto; }
      .wrapper {
        grid-template-columns: 1fr;
        padding: 100px 24px 100px;
        gap: 40px;
        text-align: center;
      }
      .btns { justify-content: center; }
      .desc { margin-left: auto; margin-right: auto; }
      .right { order: -1; }
      .scene { width: 260px; height: 280px; }
      .gift-box { width: 160px; height: 130px; }
      .logo-wrap { left: 24px; }
      .four-o-four { font-size: 6rem; }
    }
  </style>
</head>
<body>

  <div class="bg-canvas"></div>
  <div class="bg-grid"></div>
  <div class="ribbon-bg"></div>
  <div class="ribbon-bg-2"></div>

{% include 'partials/navbar.html' %}

  <div class="wrapper" style="margin-top: 110px;">

    <!-- Left -->
    <div class="left">
      <div class="kicker">
        <div class="kicker-line"></div>
        <span class="kicker-text">Error 404</span>
      </div>

      <div class="four-o-four">404</div>

      <h1 class="title">This gift<br>got lost in transit.</h1>

      <p class="desc">
        Looks like the page you're hunting for has been misplaced — maybe it's hiding under ribbon scraps. Let's find something beautiful for you instead.
      </p>

      <div class="btns">
        <a href="/" class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          </svg>
          Back to Home
        </a>
        <a href="/products/" class="btn btn-ghost">
          Browse Gifts
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </a>
      </div>
    </div>

    <!-- Right: Illustration -->
    <div class="right">
      <div class="scene">

        <!-- Sparkles -->
        <div class="sparkle" style="top:10px;left:30px;--dur:2.8s;--delay:0.2s;">
          <svg class="sparkle-star" style="--sz:18px" viewBox="0 0 24 24"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z" fill="#af101a" opacity="0.5"/></svg>
        </div>
        <div class="sparkle" style="top:50px;right:10px;--dur:3.2s;--delay:0.7s;">
          <svg class="sparkle-star" style="--sz:10px" viewBox="0 0 24 24"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z" fill="#af101a" opacity="0.6"/></svg>
        </div>
        <div class="sparkle" style="top:100px;left:10px;--dur:2.4s;--delay:1.1s;">
          <svg class="sparkle-star" style="--sz:12px" viewBox="0 0 24 24"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z" fill="#c41020" opacity="0.4"/></svg>
        </div>
        <div class="sparkle" style="bottom:80px;right:15px;--dur:3s;--delay:0.4s;">
          <svg class="sparkle-star" style="--sz:8px" viewBox="0 0 24 24"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z" fill="#af101a" opacity="0.55"/></svg>
        </div>

        <!-- Floating question tag -->
        <div class="gift-tag">
          <span class="tag-question">?</span>
          <span class="tag-text">Not<br>Found</span>
        </div>

        <!-- Gift box -->
        <div class="gift-box">
          <!-- Ribbon vertical (behind lid) -->
          <div class="ribbon-v" style="z-index:2;"></div>
          <!-- Ribbon horizontal -->
          <div class="ribbon-h" style="z-index:2;"></div>

          <!-- Box body -->
          <div class="box-body" style="z-index:3;">
            <div class="box-stripe"></div>
          </div>

          <!-- Lid -->
          <div class="box-lid" style="z-index:6;">
            <div class="lid-stripe"></div>
          </div>

          <!-- Ribbon over lid -->
          <div class="ribbon-v" style="z-index:7;height:36px;bottom:116px;"></div>

          <!-- Bow -->
          <div class="bow" style="bottom:148px;">
            <div class="bow-left"></div>
            <div class="bow-right"></div>
            <div class="bow-center"></div>
          </div>
        </div>

        <!-- Shadow -->
        <div class="box-shadow-el"></div>

      </div>
    </div>
  </div>

</body>
</html>
