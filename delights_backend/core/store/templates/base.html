          "inverse-primary": "#ffb3ac",
          "secondary": "#546067",

          "on-secondary-container": "#5a666d",
          "tertiary": "#005f7b",

          "tertiary-container": "#00799c",

<style>
  /* ─── Material Symbols ─── */
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    display: inline-block;
    vertical-align: middle;
    line-height: 1;
    text-transform: none;
    letter-spacing: normal;
    word-wrap: normal;
    white-space: nowrap;
    direction: ltr;
  }

  /* ─── Base ─── */
  body {
    font-family: 'Manrope', sans-serif;
    background-color: #fdfbfb;
    background-image: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23af101a' stroke-width='1.5' stroke-opacity='0.12'%3E%3Cg transform='translate(50, 50) rotate(15)'%3E%3Cpath d='M-10,-10 h20 v20 h-20 z M0,-10 v20 M-10,-2 h20'/%3E%3Cpath d='M0,-10 c-4,-5 -8,0 -2,3 c0,0 2,0 2,-3 z M0,-10 c4,-5 8,0 2,3 c0,0 -2,0 -2,-3 z'/%3E%3C/g%3E%3Cg transform='translate(180, 120) rotate(-20)'%3E%3Cpath d='M0,0 c-8,-6 -12,0 -4,4 l-10,12 M0,0 c8,-6 12,0 4,4 l10,12' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='0' cy='0' r='3' fill='%23af101a' fill-opacity='0.08' stroke='none'/%3E%3C/g%3E%3Cg transform='translate(320, 60) rotate(10) scale(0.8)'%3E%3Cpath d='M0,5 C-15,-10 -20,15 0,30 C20,15 15,-10 0,5 Z'/%3E%3C/g%3E%3Cg transform='translate(100, 250) rotate(-15) scale(0.9)'%3E%3Cpath d='M-10,-10 h20 v20 h-20 z M0,-10 v20 M-10,-2 h20'/%3E%3Cpath d='M0,-10 c-4,-5 -8,0 -2,3 c0,0 2,0 2,-3 z M0,-10 c4,-5 8,0 2,3 c0,0 -2,0 -2,-3 z'/%3E%3C/g%3E%3Cg transform='translate(250, 220) rotate(45)'%3E%3Cpath d='M0,-8 l2,6 6,2 -6,2 -2,6 -2,-6 -6,-2 6,-2 z' fill='%23af101a' fill-opacity='0.08' stroke='none'/%3E%3C/g%3E%3Cg transform='translate(60, 160) rotate(15) scale(0.7)'%3E%3Cpath d='M0,-8 l2,6 6,2 -6,2 -2,6 -2,-6 -6,-2 6,-2 z' fill='%23af101a' fill-opacity='0.08' stroke='none'/%3E%3C/g%3E%3Cg transform='translate(330, 310) rotate(25) scale(0.8)'%3E%3Cpath d='M0,0 c-8,-6 -12,0 -4,4 l-10,12 M0,0 c8,-6 12,0 4,4 l10,12' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='0' cy='0' r='3' fill='%23af101a' fill-opacity='0.08' stroke='none'/%3E%3C/g%3E%3Cg transform='translate(180, 360) rotate(-10) scale(0.6)'%3E%3Cpath d='M0,5 C-15,-10 -20,15 0,30 C20,15 15,-10 0,5 Z'/%3E%3C/g%3E%3Cg transform='translate(360, 180) rotate(-15) scale(0.5)'%3E%3Cpath d='M0,-8 l2,6 6,2 -6,2 -2,6 -2,-6 -6,-2 6,-2 z' fill='%23af101a' fill-opacity='0.08' stroke='none'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    background-size: 400px 400px;
    color: #1a1c1c;
  }
  h1, h2, h3, .font-serif { font-family: 'Noto Serif', serif; }

  /* ─── Scrollbar ─── */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

  /* ─── Selection ─── */
  ::selection { background: #80011f; color: #fff; }

  /* Product Card */
  .wd-card {
    background: #FFFFFF;
    border: 1px solid #E7DED6;
    border-radius: 12px;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
    display: flex;
    flex-direction: column;
    box-shadow: 0 6px 18px rgba(0,0,0,0.04);
  }
  .wd-card:hover {
    border-color: #D9CDC0;
    box-shadow: 0 10px 28px rgba(0,0,0,0.06);
  }
  .wd-card:hover .wd-card-img img { transform: scale(1.02); }
  .wd-card-img {
    overflow: hidden;
    background: #F7ECEE;
    position: relative;
  }
  .wd-card-img img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
  }

  /* Badge */
  .wd-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 3px 8px;
    border-radius: 2px;
  }
  .wd-badge-primary { border: 1px solid #80011F; color: #80011F; }
  .wd-badge-secondary { border: 1px solid #3b6934; color: #3b6934; }
  .wd-badge-surface { background: #b9eeab; color: #23501e; }

  /* CTA Buttons */
  .wd-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.2s ease;
    border: none;
  }
  .wd-btn:active { transform: scale(0.98); }
  .wd-btn-primary { background: #80011F; color: #fff; }
  .wd-btn-primary:hover { background: #9d0d2a; }
  .wd-btn-outline { background: #FFFFFF; border: 1px solid #80011F; color: #80011F; }
  .wd-btn-outline:hover { background: #F7ECEE; }

  /* Form Inputs */
  .wd-input {
    width: 100%;
    background: #FFFFFF;
    border: 1px solid #E7DED6;
    color: #191919;
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
    padding: 10px 12px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    border-radius: 8px;
  }
  .wd-input:focus {
    border-color: #80011F;
    box-shadow: 0 0 0 3px rgba(128, 1, 31, 0.12);
  }
  .wd-input::placeholder { color: #6B6460; }

  /* Section kicker */
  .wd-kicker {
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: #80011F;
  }

  /* Divider */
  .wd-divider { height: 1px; background: #E7DED6; border: none; }

  /* WhatsApp Float */
  .wa-float {
    position: fixed;
    right: 22px;
    bottom: 22px;
    z-index: 9999;
    background: #25D366;
    color: #fff;
    width: 52px;
    height: 52px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 24px rgba(37, 211, 102, 0.4);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .wa-float:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 14px 32px rgba(37, 211, 102, 0.5);
  }
</style>

{% block extra_css %}{% endblock %}
</head>

<script>
  // ═══════════════════════════════════════════
  // FAVORITES SYSTEM
  // ═══════════════════════════════════════════

  const FAVORITES_ENDPOINT = '{% url "toggle_favorite" %}';
  const FAVORITE_STATE = new Set((document.body.dataset.favoriteIds || '').split(',').filter(Boolean));

  function getCsrfToken() {
    return document.querySelector('[name=csrfmiddlewaretoken]')?.value || '';
  }

  function setFavoritesCount(count) {
    const countBadge = document.getElementById('favoritesCount');
    const favBtn = document.getElementById('favoritesBtn');
    document.body.dataset.favoritesCount = String(count);

    if (!countBadge || !favBtn) return;

    if (count > 0) {
      countBadge.textContent = count;
      countBadge.style.display = 'flex';
      favBtn.classList.add('has-favorites');
    } else {
      countBadge.style.display = 'none';
      favBtn.classList.remove('has-favorites');
    }
  }

  function setFavoriteButtonState(btn, isFavorited) {
    btn.classList.toggle('favorited', isFavorited);
    btn.setAttribute('aria-pressed', isFavorited ? 'true' : 'false');
    const icon = btn.querySelector('.material-symbols-outlined');
    if (icon) {
      icon.style.fontVariationSettings = isFavorited
        ? "'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24"
        : "'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24";
    }
  }

  function syncFavoriteButtons(productId, isFavorited) {
    document.querySelectorAll(`[data-hamper-id="${productId}"], [data-product-id="${productId}"]`).forEach(btn => {
      setFavoriteButtonState(btn, isFavorited);
    });
  }

  function bindFavoriteButtons() {
    document.querySelectorAll('.category-product-wishlist:not([data-favorites-bound]), .favorite-toggle:not([data-favorites-bound])').forEach(btn => {
      const productId = btn.getAttribute('data-hamper-id') || btn.getAttribute('data-product-id');
      if (!productId) return;

      btn.setAttribute('data-favorites-bound', 'true');
      setFavoriteButtonState(btn, FAVORITE_STATE.has(String(productId)));

      btn.addEventListener('click', async (event) => {
        event.preventDefault();
        event.stopPropagation();

        try {
          const response = await fetch(FAVORITES_ENDPOINT, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': getCsrfToken(),
            },
            body: JSON.stringify({ hamper_id: parseInt(productId, 10) }),
          });

          const data = await response.json();
          if (!response.ok || !data.success) return;

          if (data.is_favorited) {
            FAVORITE_STATE.add(String(productId));
          } else {
            FAVORITE_STATE.delete(String(productId));
          }

          setFavoritesCount(data.count || FAVORITE_STATE.size);
          syncFavoriteButtons(String(productId), data.is_favorited);
        } catch (error) {
          console.error('Favorite error:', error);
        }
      });
    });
  }

  document.addEventListener('DOMContentLoaded', function() {
    setFavoritesCount(Number(document.body.dataset.favoritesCount || FAVORITE_STATE.size || 0));
    bindFavoriteButtons();
  });

  const favoriteObserver = new MutationObserver(function() {
    bindFavoriteButtons();
  });

  favoriteObserver.observe(document.body, { childList: true, subtree: true });

  /* Header scroll shadow */
  var header = document.getElementById('siteHeader');
  if (header) {
    window.addEventListener('scroll', function () {
      header.classList.toggle('scrolled', window.scrollY > 10);
    }, { passive: true });
  }

  /* Mobile Menu */
  var menuBtn  = document.getElementById('mobileMenuToggle');
  var menuIcon = document.getElementById('mobileMenuIcon');
  var menu     = document.getElementById('mobileMenu');

  if (menuBtn && menu) {
    menuBtn.addEventListener('click', function () {
      var isOpen = menu.classList.toggle('hidden') === false;
      menuBtn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      if (menuIcon) menuIcon.textContent = isOpen ? 'close' : 'menu';
    });
    window.addEventListener('resize', function () {
      if (window.innerWidth >= 768 && !menu.classList.contains('hidden')) {
        menu.classList.add('hidden');
        menuBtn.setAttribute('aria-expanded', 'false');
        if (menuIcon) menuIcon.textContent = 'menu';
      }
    });
  }

  /* Desktop Dropdowns */
  var dropdowns = document.querySelectorAll('.wd-nav-dropdown');

  function closeAllDropdowns() {
    dropdowns.forEach(function (d) {
      d.classList.remove('is-open');
      var t = d.querySelector('.wd-nav-dropdown-trigger');
      if (t) t.setAttribute('aria-expanded', 'false');
    });
  }

  dropdowns.forEach(function (dropdown) {
    var trigger = dropdown.querySelector('.wd-nav-dropdown-trigger');
    if (!trigger) return;
    trigger.addEventListener('click', function (event) {
      if (window.innerWidth < 768) return;
      var wasOpen = dropdown.classList.contains('is-open');
      closeAllDropdowns();
      if (!wasOpen) {
        event.preventDefault();
        dropdown.classList.add('is-open');
        trigger.setAttribute('aria-expanded', 'true');
      }
    });
  });

  document.addEventListener('click', function (event) {
    var clicked = event.target && event.target.closest ? event.target.closest('.wd-nav-dropdown') : null;
    if (!clicked) closeAllDropdowns();
  });
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeAllDropdowns(); });
  window.addEventListener('resize', function () { if (window.innerWidth < 768) closeAllDropdowns(); });
</script>

</body>
